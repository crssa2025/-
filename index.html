<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | عبود #هاشتاج_شاهد</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: 'Cairo', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-size: 24px; margin: 0; color: #fff; }
        .header span { color: #00bfff; }

        /* المشغل في منتصف الشاشة */
        .video-container {
            width: 95%; max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #111;
            border: 2px solid #00bfff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.4);
            position: relative;
        }

        video { width: 100%; height: 100%; background: #000; }

        /* زر تشغيل في حال لم يعمل تلقائياً */
        #playBtn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 25px; background: #00bfff;
            color: #000; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer; z-index: 10;
        }

        .match-name { margin-top: 10px; font-size: 16px; color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>عبود <span>#هاشتاج_شاهد</span></h1>
        <div class="match-name">ريال مدريد 🆚 مانشستر سيتي</div>
    </div>

    <div class="video-container">
        <button id="playBtn" onclick="startStream()">اضغط لتشغيل البث ⚽</button>
        <video id="video" controls playsinline></video>
    </div>

    <p style="margin-top: 15px; font-size: 12px; color: #555;">حقوق البث محفوظة لـ عبود</p>

    <script>
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const streamUrl = 'https://wjk30.tutor3.site/live/51838_.m3u8?session=fgXV65Um2lfy1XM-PnwCNI6JKBGv-7c8uR6nyqvK0yPD6645oYewQjFQ6kFRCCFO8v9weMjgiE5rg7pCM4ODC3gY8vmYU53y&location=local';

        function startStream() {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                    playBtn.style.display = 'none';
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        alert("عذراً، السيرفر يرفض التشغيل حالياً أو الرابط انتهى.");
                    }
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.play();
                playBtn.style.display = 'none';
            }
        }

        // محاولة تشغيل صامت عند التحميل
        window.onload = () => {
            video.muted = true;
            startStream();
        };
    </script>
</body>
</html>
