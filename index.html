<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ᴛʀᴇɴᴅ ᴇᴍᴘɪʀᴇ | كاشف الكذب الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --danger: #ff4757;
            --success: #2ed573;
            --dark-bg: #0a0a0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--dark-bg);
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
        }

        /* خلفية تقنية */
        .bg-animate {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        .container {
            width: 90%; max-width: 400px; text-align: center; z-index: 10;
        }

        h1 { font-size: 28px; margin-bottom: 20px; background: linear-gradient(45deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* اختيار الاسم */
        .name-selector {
            width: 100%; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--primary); color: white; font-size: 18px; margin-bottom: 20px;
            font-family: 'Tajawal'; outline: none;
        }

        option { background: #111; color: white; }

        /* منطقة البصمة */
        .fingerprint-area {
            position: relative; width: 180px; height: 180px; margin: 30px auto;
            border: 3px solid var(--primary); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        .fingerprint-area i { font-size: 80px; opacity: 0.8; }

        /* تأثير المسح (Scanner) */
        .scanner-bar {
            position: absolute; width: 100%; height: 4px; background: var(--primary);
            top: 0; left: 0; border-radius: 10px; box-shadow: 0 0 15px var(--primary);
            display: none; animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .scanning-text { margin-top: 10px; font-size: 14px; color: var(--primary); display: none; }

        /* النتيجة */
        #resultOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); animation: fadeIn 0.5s;
        }

        .result-box {
            padding: 40px; border-radius: 30px; text-align: center;
            width: 80%; border: 2px solid;
        }

        .status-icon { font-size: 80px; margin-bottom: 20px; }
        .status-text { font-size: 40px; font-weight: 900; margin-bottom: 10px; }
        .user-name { font-size: 22px; color: #aaa; margin-bottom: 30px; }

        .btn-retry {
            padding: 12px 40px; border-radius: 15px; border: none;
            background: white; color: black; font-weight: 900; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* أيقونة البصمة SVG */
        .fp-svg { width: 100px; fill: var(--primary); }

    </style>
</head>
<body>

<div class="bg-animate"></div>

<div class="container">
    <h1>جهاز كشف الكذب 🛡️</h1>
    <p style="color: #888; margin-bottom: 20px;">اختر اسمك وضع بصمتك للاختبار</p>

    <select id="nameList" class="name-selector">
        <option value="">-- اختر اسم الشخص --</option>
        </select>

    <div class="fingerprint-area" id="fpArea" onmousedown="startScan()" onmouseup="stopScan()" ontouchstart="startScan()" ontouchend="stopScan()">
        <div class="scanner-bar" id="scanner"></div>
        <svg class="fp-svg" viewBox="0 0 512 512">
            <path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256 256-114.6 256-256S397.4 0 256 0zm0 472c-119.3 0-216-96.7-216-216S136.7 40 256 40s216 96.7 216 216-96.7 216-216 216z"/>
            <path d="M256 80c-97.1 0-176 78.9-176 176s78.9 176 176 176 176-78.9 176-176S353.1 80 256 80zm0 312c-75.1 0-136-60.9-136-136s60.9-136 136-136 136 60.9 136 136-60.9 136-136 136z"/>
            <circle cx="256" cy="256" r="60"/>
        </svg>
    </div>

    <div class="scanning-text" id="statusText">جاري مسح البصمة... ثبت إصبعك</div>
    <p style="margin-top: 40px; font-size: 11px; color: #444;">حقوق الفعالية لـ عبود | </p>
</div>

<div id="resultOverlay">
    <div class="result-box" id="resultBox">
        <div class="status-icon" id="resIcon"></div>
        <div class="status-text" id="resStatus"></div>
        <div class="user-name" id="resName"></div>
        <button class="btn-retry" onclick="resetApp()">محاولة أخرى</button>
    </div>
</div>

<script>
    const names = [
        "وفاء كاظم", "احمد قصي", "مرتضى علي", "بنين جليل", "فاتن توفيق", 
        "طيبه محمد كامل", "نور عبد الزهره", "امجد وسام", "رانيا عمار", "الحسن بسام", 
        "بسمه", "ميرو 😅", "رشا احمد 💅🏻", "𝒓𝒆𝒕𝒂𝒈", "إبراهيم", 
        "نبأ محمد خيري", "زينة محمد سعدي", "شهد طه✨", "عبد الستار طلال علي", "ريهام عمار", 
        "غدير نجوان 🙈", "تبارك عبود 🌚", "فاطمه علي", "ملاك لؤي🤭", "ايه علي", 
        "ابرار²", "مريم محمد", "عباس ماجد"
    ];

    const select = document.getElementById('nameList');
    names.sort().forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
    });

    let scanTimeout;

    function startScan() {
        const name = select.value;
        if(!name) {
            alert("يرجى اختيار الاسم أولاً!");
            return;
        }
        
        document.getElementById('scanner').style.display = 'block';
        document.getElementById('statusText').style.display = 'block';
        document.getElementById('fpArea').style.transform = 'scale(0.95)';
        
        // التحليل يستغرق 3 ثواني
        scanTimeout = setTimeout(showResult, 3000);
    }

    function stopScan() {
        clearTimeout(scanTimeout);
        document.getElementById('scanner').style.display = 'none';
        document.getElementById('statusText').style.display = 'none';
        document.getElementById('fpArea').style.transform = 'scale(1)';
    }

    function showResult() {
        const name = select.value;
        const isTrue = Math.random() > 0.5; // اختيار عشوائي بين صادق وكاذب
        
        const overlay = document.getElementById('resultOverlay');
        const box = document.getElementById('resultBox');
        const icon = document.getElementById('resIcon');
        const status = document.getElementById('resStatus');
        const resName = document.getElementById('resName');

        resName.innerText = name;
        overlay.style.display = 'flex';

        if(isTrue) {
            box.style.borderColor = "var(--success)";
            box.style.boxShadow = "0 0 30px rgba(46, 213, 115, 0.3)";
            icon.innerText = "✅";
            status.innerText = "صـادق";
            status.style.color = "var(--success)";
        } else {
            box.style.borderColor = "var(--danger)";
            box.style.boxShadow = "0 0 30px rgba(255, 71, 87, 0.3)";
            icon.innerText = "❌";
            status.innerText = "كـاذب";
            status.style.color = "var(--danger)";
        }
    }

    function resetApp() {
        document.getElementById('resultOverlay').style.display = 'none';
        select.value = "";
        stopScan();
    }
</script>

</body>
</html>
