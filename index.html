<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | عبود #هاشتاق_شاهد</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            font-family: 'Cairo', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { font-size: 26px; margin: 0; color: #fff; }
        .header h1 span { color: #00bfff; text-shadow: 0 0 10px #00bfff; }
        .live-tag { background: red; padding: 2px 12px; border-radius: 4px; font-size: 14px; animation: blink 1s infinite; }

        /* حاوية المشغل في المنتصف */
        .player-box {
            width: 95%; max-width: 800px;
            aspect-ratio: 16 / 9;
            border: 2px solid #00bfff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.3);
        }

        .video-js { width: 100% !important; height: 100% !important; }

        @keyframes blink { 0% {opacity:1} 50% {opacity:0.4} 100% {opacity:1} }
    </style>
</head>
<body>

    <div class="header">
        <h1>عبود <span>#هاشتاق_شاهد</span></h1>
        <div class="live-tag">مباشر: ريال مدريد × مان سيتي</div>
    </div>

    <div class="player-box">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline muted>
            <source src="https://cors-anywhere.herokuapp.com/https://wjk30.tutor3.site/live/51838_.m3u8?session=fgXV65Um2lfy1XM-PnwCNI6JKBGv-7c8uR6nyqvK0yPD6645oYewQjFQ6kFRCCFO8v9weMjgiE5rg7pCM4ODC3gY8vmYU53y&location=local" type="application/x-mpegURL">
        </video>
    </div>

    <div style="margin-top: 15px; font-size: 13px; color: #888;">
        إذا لم يظهر البث، يرجى الضغط على زر التشغيل وتفعيل الصوت
    </div>

    <script>
        var player = videojs('my-video', {
            autoplay: true,
            fluid: true,
            liveui: true
        });

        // محاولة تشغيل تلقائي
        player.ready(function() {
            player.play();
        });
    </script>
</body>
</html>
