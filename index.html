<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>بث مباشر | عبود #هاشتاق_شاهد</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            font-family: 'Cairo', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* الهيدر العلوي - الحقوق */
        .branding-header {
            text-align: center; margin-bottom: 20px;
        }

        .branding-header h1 {
            font-size: 28px; font-weight: 900; margin: 0;
            color: #fff; text-shadow: 0 0 15px rgba(0, 191, 255, 0.7);
        }

        .branding-header h1 span {
            color: #00bfff;
        }

        .match-card {
            background: #ff0000; color: white; padding: 5px 20px;
            border-radius: 50px; font-weight: bold; font-size: 16px;
            margin-top: 10px; display: inline-block; animation: blink 1.5s infinite;
        }

        /* حاوية المشغل في المنتصف */
        .player-container {
            width: 95%; max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #000;
            border: 4px solid #333;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 20px rgba(0, 191, 255, 0.2);
            position: relative;
        }

        #dplayer { width: 100%; height: 100%; }

        /* حقوق إضافية بالأسفل */
        .footer-rights {
            margin-top: 20px; color: #666; font-size: 14px; font-weight: bold;
        }

        @keyframes blink { 0% {opacity:1} 50% {opacity:0.5} 100% {opacity:1} }

        @media (max-width: 768px) {
            .branding-header h1 { font-size: 22px; }
            .player-container { width: 98%; border-width: 2px; }
        }
    </style>
</head>
<body>

    <div class="branding-header">
        <h1>عبود <span>#هاشتاق_شاهد</span></h1>
        <div class="match-card">ريال مدريد 🆚 مانشستر سيتي - مباشر</div>
    </div>

    <div class="player-container">
        <div id="dplayer"></div>
    </div>

    <div class="footer-rights">
        DESIGNED BY: <span style="color:#00bfff">ABOOD</span>
    </div>

    <script>
        // الرابط الجديد بصيغة HTTPS
        const streamUrl = 'https://wjk30.tutor3.site/live/51838_.m3u8?session=fgXV65Um2lfy1XM-PnwCNI6JKBGv-7c8uR6nyqvK0yPD6645oYewQjFQ6kFRCCFO8v9weMjgiE5rg7pCM4ODC3gY8vmYU53y&location=local';

        const dp = new DPlayer({
            container: document.getElementById('dplayer'),
            live: true,
            autoplay: true,
            theme: '#00bfff',
            lang: 'ar',
            screenshot: true,
            video: {
                url: streamUrl,
                type: 'hls'
            }
        });

        // محاولة التشغيل التلقائي (المتصفح قد يطلب كتم الصوت أولاً)
        dp.on('canplay', function () {
            dp.play();
        });

        // إذا لم يعمل تلقائياً بسبب سياسة المتصفح
        window.onload = function() {
            setTimeout(() => {
                if (dp.video.paused) {
                    dp.video.muted = true;
                    dp.play();
                }
            }, 1000);
        };
    </script>

</body>
</html>
